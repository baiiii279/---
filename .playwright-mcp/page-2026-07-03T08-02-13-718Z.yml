            - paragraph [ref=e247]: 从实验结果可以看出，本文提出的注意力LSTM模型在各项指标上均优于传统机器学习方法。准确率达到92%，相比随机森林提升8个百分点。分析认为，LSTM能够有效捕捉时间序列中的长期依赖关系，注意力机制则进一步聚焦于关键时间步，提升了模型的判别能力[2]。
            - heading "4.3 系统功能测试与用户体验评估" [level=3] [ref=e248]
            - paragraph [ref=e249]:
              - strong [ref=e250]: 功能测试
              - text: ：使用JMeter模拟100个用户同时访问系统，测试平台的响应时间和并发处理能力。结果显示，平均响应时间为185ms，最大响应时间为320ms，99%的请求在250ms内完成，满足设计目标（低于200ms）[1]。
            - paragraph [ref=e251]:
              - strong [ref=e252]: 用户体验评估
              - text: ：邀请10名志愿者（年龄25-45岁，包含技术背景和非技术背景）进行为期一周的试用，随后完成问卷调查。问卷采用5点量表（1-非常不满意，5-非常满意），衡量易用性、功能完整性、界面美观度、整体满意度四个方面。结果如下表所示：
