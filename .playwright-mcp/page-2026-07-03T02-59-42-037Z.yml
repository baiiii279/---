          - generic [ref=f11e66]: 软件项目开发课程设计 一、课程设计目的 涵盖软件工程、软件开发环境与工具、数据库原理、软件测试等课程内容。 本课程通过完整地实施软件开发周期各个阶段的任务，复习并强化软件工程的主要理论、方法、规范等。通过集体项目开发，培养学生的合作意识和团队精神，培养学生对技术文档的撰写能力。 二、课程设计要求 1、开展形式 采用“项目小组”形式，按照1-3个人一组，每个项目小组选出一名组长，组织召集项目组成员讨论、制定项目开发计划，分配项目成员贡献度（共100%）。 2、考核方式 考勤占10%，百分制计算。旷课一次扣 50 分，早退或迟到一次扣20分，缺勤超过三分之一（即旷课两次）直接挂科。 平时占20%，百分制计算。主要根据课堂回答问题和上课表现打分，通过检查小组任务完成情况。 项目占70%，百分制计算。主要根据程序+设计报告+答辩三个部分的表现来评分。 注：总分=考勤10%+平时20%+项目70%。 3、课程设计选题 本课程设计需开发一个软件，主题自己决定，尽可能创新、实用有意义。考核要求如下： 设计中应包括用户注册和登录功能，登录注册页面需做好用户名或者密码正确与否的细节判断，做好表单验证。 设计至少包括用户和管理员两种权限，可以采用前后端分离开发。 界面应美观，风格统一，具有良好的交互性、比较流畅的体验，如动画效果； 设计应包含个人页面，包括用户头像、用户名、修改账号密码、我的收藏等相关的信息。 数据来源可以是SQL Server数据库或者MySQL数据库，其中文件或者数据表不少于3个。 更多功能不限于上述所列举。 三、课程设计提交 1、提交首页纸（企业微信群下载并打印, 最后一次课提交） 2、课程设计材料 课程设计论文（按照模板编写），内容应包含系统开发环境介绍，项目需求分析、总体设计与功能详细设计、数据库设计、系统实现和系统测试。 课程设计相关代码 以上2 份文件打包压缩成 rar 或 zip，并命名为“第 x 组 作品名”，在最后一次课提交。 四、课程设计任务