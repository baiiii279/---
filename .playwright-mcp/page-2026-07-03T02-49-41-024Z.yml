                    - text: ：使用监督学习方法构建健康状态评估模型。选择XGBoost作为分类器，输入特征为30维，输出标签为“健康”、“亚健康”及“高风险”三类。训练数据来自公开数据集（如PhysioNet上的心率数据）及模拟生成的标注数据。模型采用交叉验证进行调参，最优参数为：学习率0.1，树深度6，样本占比0.8。
