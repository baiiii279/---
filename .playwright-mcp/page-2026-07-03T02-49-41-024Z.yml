                - row "推荐建议 280.5 430.1 0.03%" [ref=f6e400]:
                  - cell "推荐建议" [ref=f6e401]
                  - cell "280.5" [ref=f6e402]
                  - cell "430.1" [ref=f6e403]
                  - cell "0.03%" [ref=f6e404]
            - paragraph [ref=f6e405]: 分析表明，所有API的平均响应时间均低于400ms，满足日常使用要求。风险评估接口耗时较长，主要归因于实时模型推理的计算成本较高，后续可通过模型量化或GPU加速进行优化。
            - heading "4.2.2 并发处理能力" [level=4] [ref=f6e406]
            - paragraph [ref=f6e407]: 进行了阶梯式负载测试，并发用户数从50个逐步升至500个，每个阶梯持续运行5分钟。结果显示，系统在350个并发用户以内能保持稳定，响应时间增幅小于30%；当用户数超过400个时，平均响应时间从200ms骤升至1200ms，系统开始出现队列堵塞。因此，建议实际部署时至少配置两台分析服务器，并使用负载均衡分散压力。
            - heading "4.2.3 资源占用" [level=4] [ref=f6e408]
            - paragraph [ref=f6e409]: 监控正常运行状态下的资源占用率：
            - list [ref=f6e410]:
              - listitem [ref=f6e411]: CPU平均占用率：42.3%（峰值65.1%）。
              - listitem [ref=f6e412]: 内存占用：7.8GB（总32GB），占比24.4%。
              - listitem [ref=f6e413]: 磁盘I/O：平均读取速度45MB/s，写入速度22MB/s。
              - listitem [ref=f6e414]: 数据库连接池：最大使用率60%。
            - paragraph [ref=f6e415]: 资源占用处于合理范围内，表明系统设计对硬件要求适中，能够运行在中等配置的云服务器上。
            - heading "4.3 智能分析模块准确性评估" [level=3] [ref=f6e416]
            - paragraph [ref=f6e417]: 本实验评估了健康风险预测模型的性能。选择XGBoost作为主模型，与逻辑回归（LR）、随机森林（RF）和K近邻（KNN）作为基线模型进行对比。评价指标包括准确率、精准率、召回率和F1分数，以及回归任务的RMSE（均方根误差）。结果如下表所示：
