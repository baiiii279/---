                  - generic:
                    - generic: "#### 3.3.1 数据清洗与融合算法"
                  - text: 数据清洗采用两步策略：
                  - generic:
                    - text: "*"
                    - generic: "**基于规则的清洗**"
                    - text: ：定义物理限值规则，例如，步数应位于0-100000步/天范围内，心率应在30-220bpm范围内。超出范围的数据被标记为可疑，并执行平滑处理。
                  - generic:
                    - text: "*"
                    - generic: "**基于统计的清洗**"
                    - text: ：计算每个用户数据的时间序列滑动均值与标准差，若某点偏差超过3倍标准差，则视为异常值，并使用前后20帧的中位数进行替代。
                  - text: 数据融合算法采用时间戳加权平均法，公式为：
                  - generic:
                    - generic: "```"
                  - generic:
                    - generic: 融合值 = Σ(w_i * data_i) / Σ(w_i)
                  - generic:
                    - generic: "```"
                  - text: 其中权重 w_i = 1/(1+|t - t_ref|)，t_ref为参考时间点，确保离参考时间越近的数据贡献越大。
                  - generic:
                    - generic: "#### 3.3.2 用户画像构建方法"
                  - text: 用户画像是一个动态更新的结构化文档，包含以下维度：
                  - generic: "* 基础属性：年龄、性别、BMI、慢性病史。"
