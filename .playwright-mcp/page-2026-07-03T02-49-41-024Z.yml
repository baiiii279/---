            - paragraph [ref=f6e456]: XGBoost在所有指标上均表现最优，准确率达到92.3%，F1分数为0.923，较逻辑回归提升了7.7个百分点。RMSE低至0.12，说明预测值与真实值之间的偏差较小。对比实验证明了XGBoost在健康风险预测任务中的有效性。
            - paragraph [ref=f6e457]: 同时，绘制了混淆矩阵（示意）：真实高风险案例中有98%被正确识别，仅2%被误判为亚健康；而健康状态的误报率为4%，说明模型在实际应用中具有较低的假阳性率，有利于减少不必要的预警。
            - heading "4.4 用户满意度调查" [level=3] [ref=f6e458]
            - paragraph [ref=f6e459]: 邀请了25名志愿者（年龄20-50岁，男女各半）使用本平台进行为期一周的体验。体验内容包括：数据上传、查看健康报告、接收预警及个性化建议。体验结束后，通过问卷（Likert 5级量表）收集反馈。结果如下：
            - table [ref=f6e460]:
