                  - text: 画像采用在线向量更新机制，每次新数据到达后，使用指数移动平均法更新画像特征。例如，平均心率的更新公式为：
                  - generic:
                    - generic: "```"
                  - generic:
                    - generic: new_avg = α * current_value + (1-α) * old_avg
                  - generic:
                    - generic: "```"
                  - text: 其中α=0.2，以对近期数据赋予更高权重。
                  - generic:
