            - paragraph [ref=f6e177]: 好的，以下是为您润色后的论文全文及修改说明。
            - separator [ref=f6e178]
            - heading "润色后的论文全文" [level=3] [ref=f6e179]:
              - strong [ref=f6e180]: 润色后的论文全文
            - heading "健康智能平台的设计与实现" [level=1] [ref=f6e181]
            - heading "1 引言" [level=2] [ref=f6e182]
            - heading "1.1 背景与意义" [level=3] [ref=f6e183]
            - paragraph [ref=f6e184]: 随着现代社会生活节奏的持续加快与人口老龄化趋势的日益加剧，慢性病管理、健康监测及预防性医疗已成为公共卫生领域的核心议题。传统的健康管理方式主要依赖于定期的医院体检和医生的主观判断，这种方法不仅成本高昂，而且难以实现对个体健康状况进行持续、实时的跟踪[1]。近年来，信息技术的飞速发展，尤其是物联网（IoT）、大数据分析与人工智能（AI）技术的日趋成熟，为健康管理模式的革新奠定了技术基础。可穿戴设备（如智能手表、手环）、移动医疗应用及远程监测系统的普及，使得大规模、多维度的健康数据采集成为现实。然而，如何将这些分散、异构的数据进行有效整合，并从中挖掘出具有价值的健康洞见，从而构建从“数据采集”到“智能决策”的完整闭环，是当前健康管理领域亟待解决的核心问题[2]。
            - paragraph [ref=f6e185]: 健康智能平台的设计与实现正是在此背景下应运而生。该平台旨在通过信息化手段，打破传统健康管理中数据孤立、服务被动的局限，为用户提供个性化、预测性的健康管理服务。这不仅有助于提升个人健康管理的效率与效果，还能为医疗机构和公共卫生决策者提供数据支持，从而推动医疗模式从“以治疗为中心”向“以预防为中心”转变。
            - heading "1.2 现有健康管理平台的不足" [level=3] [ref=f6e186]
            - paragraph [ref=f6e187]: 尽管市场上已存在众多健康管理平台与移动应用，但它们普遍存在以下不足：
            - paragraph [ref=f6e188]:
              - text: 首先，
              - strong [ref=f6e189]: 数据孤岛问题严重
              - text: 。不同厂商的可穿戴设备、不同品牌的健康应用所采用的数据格式、通信协议及云端存储方案各异，导致用户数据分散于各个孤立系统之中，难以形成完整的健康画像[2]。例如，用户的运动数据可能记录在品牌A的手环中，而睡眠数据则记录在品牌B的应用里，平台缺乏统一的数据接入与融合机制。
            - paragraph [ref=f6e190]:
              - text: 其次，
              - strong [ref=f6e191]: 功能单一，缺乏智能化分析
              - text: 。许多现有平台仅停留在简单的数据记录与可视化展示层面，例如显示步数、心率曲线或睡眠时长。它们缺乏深度的数据挖掘能力，无法提供健康风险评估、疾病预警或个性化的干预建议[1]。用户难以获得诸如“我的健康状况究竟如何？”或“我接下来可能面临什么风险？”等关键问题的答案。
            - paragraph [ref=f6e192]:
              - text: 最后，
              - strong [ref=f6e193]: 用户参与度低，粘性不足
              - text: 。由于缺乏个性化互动与精准反馈，许多健康管理应用的用户活跃度较低，常出现“安装后即被遗忘”的现象。平台未能有效激励用户持续使用，也无法根据用户行为动态调整服务策略。
            - heading "1.3 研究目标" [level=3] [ref=f6e194]
            - paragraph [ref=f6e195]:
              - text: 针对上述问题，本论文的研究目标是：设计并实现一个集
              - strong [ref=f6e196]: 健康数据采集、智能分析与个性化服务
              - text: 于一体的健康智能平台。该平台应具备以下核心能力：
            - list [ref=f6e197]:
              - listitem [ref=f6e198]:
                - strong [ref=f6e199]: 多源数据融合
                - text: ：支持从多种主流可穿戴设备及健康应用中接入数据，并进行标准化清洗与融合。
              - listitem [ref=f6e200]:
                - strong [ref=f6e201]: 智能分析与预警
                - text: ：基于机器学习模型，对用户的心率、步数、睡眠、血压等多维数据进行综合评估，实现健康状态的实时监测与风险的早期预警。
              - listitem [ref=f6e202]:
                - strong [ref=f6e203]: 个性化服务推荐
                - text: ：根据用户画像与健康分析结果，动态生成饮食、运动、作息等个性化建议。
            - paragraph [ref=f6e204]: 通过该平台，旨在解决数据孤岛、功能单一及用户粘性低等问题，为健康管理提供一套智能化、闭环式的解决方案。
            - heading "1.4 论文贡献与章节安排" [level=3] [ref=f6e205]
            - paragraph [ref=f6e206]: 本文的主要贡献包括：
            - list [ref=f6e207]:
              - listitem [ref=f6e208]: 提出了一种基于微服务架构的健康智能平台总体设计方案，实现了高内聚、低耦合的系统结构。
              - listitem [ref=f6e209]: 设计并实现了一套多源异构健康数据的清洗与融合算法，有效提升了数据质量。
              - listitem [ref=f6e210]: 构建了基于用户画像的健康风险预警模型，并对其准确性进行了验证。
              - listitem [ref=f6e211]: 通过用户满意度调查与系统性能测试，验证了平台的实用性与可靠性。
            - paragraph [ref=f6e212]: 论文的章节安排如下：第2章综述相关工作，分析现有健康平台技术与智能分析方法的优缺点；第3章详细阐述平台的方法设计，包括架构、功能模块及关键技术；第4章通过实验验证平台的性能与分析准确性；第5章总结全文并展望未来研究方向。
            - heading "2 相关工作" [level=2] [ref=f6e213]
            - heading "2.1 现有健康管理平台的技术架构与功能特点" [level=3] [ref=f6e214]
            - paragraph [ref=f6e215]:
              - text: 当前市场上的健康管理平台主要分为两类：一类是
              - strong [ref=f6e216]: 移动健康应用
              - text: ，如“华为运动健康”、“Apple Health”等，它们通常作为可穿戴设备的配套应用，负责数据展示与基础功能；另一类是
              - strong [ref=f6e217]: 专业健康数据平台
              - text: ，如医院或健康管理公司所使用的远程监测系统。从技术架构上看，多数平台采用前后端分离模式：前端负责用户交互（React Native、Vue.js），后端通过RESTful API提供服务，数据存储则使用关系型数据库（如MySQL）或NoSQL数据库（如MongoDB）[1]。在设计上，这些平台普遍具备用户注册登录、数据采集上传、图表展示及基础统计分析等功能。然而，正如引言所述，这些平台在跨设备数据互操作性与深层智能分析方面仍有较大的提升空间。例如，“Apple Health”虽然整合了多种来源的数据，但其分析功能仍以简单统计为主，缺乏基于机器学习的个性化预测[2]。
            - heading "2.2 智能健康分析技术应用现状" [level=3] [ref=f6e218]
            - paragraph [ref=f6e219]: 智能健康分析技术的核心在于机器学习在健康预测与风险评估中的应用。目前，常用的方法包括：
            - list [ref=f6e220]:
              - listitem [ref=f6e221]:
                - strong [ref=f6e222]: 时间序列分析
                - text: ：利用LSTM（长短期记忆网络）或GRU（门控循环单元）模型对连续的健康数据（如心率、步数）进行趋势预测，可用于识别异常波动[2]。
              - listitem [ref=f6e223]:
                - strong [ref=f6e224]: 分类模型
                - text: ：使用随机森林、支持向量机（SVM）或XGBoost对用户健康状态进行分类（如“健康”、“亚健康”、“高风险”），输入特征包括年龄、BMI、运动频率及睡眠质量等。
              - listitem [ref=f6e225]:
                - strong [ref=f6e226]: 风险评分模型
                - text: ：基于逻辑回归或Cox比例风险模型，计算特定疾病（如心血管疾病、糖尿病）的发病风险概率。
            - paragraph [ref=f6e227]: 在现有研究中，这些模型在特定数据集上取得了良好效果，但普遍存在两个问题：一是模型对数据质量要求较高，缺乏有效的缺失值处理与异常值清洗机制；二是模型的可解释性较差，用户难以理解被判定为高风险的原因。本平台将在智能分析引擎中引入可解释性机制，以增强用户信任。
            - heading "2.3 用户隐私保护与数据安全" [level=3] [ref=f6e228]
            - paragraph [ref=f6e229]: 健康数据属于高度敏感的个人隐私信息，其安全性是平台设计的首要考量因素。相关研究主要关注以下方面：
            - list [ref=f6e230]:
              - listitem [ref=f6e231]:
                - strong [ref=f6e232]: 数据加密
                - text: ：传输过程中采用HTTPS/TLS协议，存储时对关键字段（如姓名、身份证号）进行AES或RSA加密。
              - listitem [ref=f6e233]:
                - strong [ref=f6e234]: 访问控制
                - text: ：采用基于角色的访问控制（RBAC）模型，确保只有授权用户或角色才能访问特定数据。
              - listitem [ref=f6e235]:
                - strong [ref=f6e236]: 隐私计算
                - text: ：在分析端引入差分隐私或同态加密技术，在不泄露原始数据的前提下完成模型训练与预测[1]。
            - paragraph [ref=f6e237]: 尽管上述技术已较为成熟，但许多现有平台在实际部署中仍存在安全隐患，例如默认弱密码、API接口未鉴权等。本平台将严格遵循最小权限原则，并在开发阶段集成安全审计模块。
            - heading "2.4 教学实践课程在系统开发中的启示" [level=3] [ref=f6e238]
            - paragraph [ref=f6e239]:
              - text: 本平台的开发严格遵循了
              - strong [ref=f6e240]: 教学实践Ⅱ
              - text: 课程中强调的软件项目开发方法论[1]。具体启示包括：
            - list [ref=f6e241]:
              - listitem [ref=f6e242]:
                - strong [ref=f6e243]: 敏捷开发流程
                - text: ：采用Scrum框架进行迭代开发，每两周完成一个Sprint，确保功能逐步交付并持续获取反馈。
              - listitem [ref=f6e244]:
                - strong [ref=f6e245]: 模块化设计思想
                - text: ：通过微服务架构将系统拆分为数据采集、分析引擎、推荐服务等独立模块，便于团队并行开发及后期维护。
              - listitem [ref=f6e246]:
                - strong [ref=f6e247]: 持续集成与测试
                - text: ：采用GitLab CI流水线，每次代码提交均自动触发单元测试与集成测试，以保障代码质量。
            - paragraph [ref=f6e248]: 这些实践经验确保了平台开发过程的规范性与最终产品的可靠性。
            - heading "2.5 现有研究的局限" [level=3] [ref=f6e249]
            - paragraph [ref=f6e250]: 综合以上分析，现有研究的主要局限包括：缺乏针对多源异构健康数据的统一数据清洗框架；智能分析模型的泛化能力较差，通常仅在特定设备数据上有效；用户隐私保护机制不够完善；以及系统开发过程中缺少规范化的工程实践指导。本平台将针对这些局限进行改进，通过设计混合数据库架构、引入可解释AI模型，并采用成熟的开发方法论，打造一个更完整、更可靠的健康智能平台。
            - heading "3 方法" [level=2] [ref=f6e251]
            - heading "3.1 总体架构设计" [level=3] [ref=f6e252]
            - paragraph [ref=f6e253]:
              - text: 健康智能平台采用
              - strong [ref=f6e254]: 微服务架构
              - text: 进行设计，以解决传统单体架构在扩展性与维护性方面的不足。整体架构分为四层：
            - list [ref=f6e255]:
              - listitem [ref=f6e256]:
                - strong [ref=f6e257]: 前端用户界面层
                - text: ：使用Vue.js构建单页应用（SPA），提供用户登录、数据看板、健康报告及个性化建议等功能入口。前端通过Axios请求与后端API交互，并支持WebSocket以实现实时数据推送（如心率告警）。
              - listitem [ref=f6e258]:
                - strong [ref=f6e259]: 后端服务层
                - text: ：采用Spring Boot实现微服务集群，包括：
                - list [ref=f6e260]:
                  - listitem [ref=f6e261]:
                    - strong [ref=f6e262]: API网关
                    - text: ：使用Nginx进行反向代理与负载均衡，统一管理路由、认证及限流。
                  - listitem [ref=f6e263]:
                    - strong [ref=f6e264]: 业务逻辑组件
                    - text: ：拆分为用户服务、数据采集服务、分析服务及推荐服务，每个服务独立部署，并通过消息队列（RabbitMQ）解耦异步任务。
              - listitem [ref=f6e265]:
                - strong [ref=f6e266]: 数据存储层
                - text: ：采用混合数据库策略。
                - list [ref=f6e267]:
                  - listitem [ref=f6e268]:
                    - strong [ref=f6e269]: 关系型数据库MySQL
                    - text: ：存储用户账户信息、系统配置及日志等结构化数据。
                  - listitem [ref=f6e270]:
                    - strong [ref=f6e271]: 非关系型数据库MongoDB
                    - text: ：存储高频健康数据（如每分钟心率序列、每步行走轨迹），利用其文档模型的灵活性处理异构数据。
                  - listitem [ref=f6e272]:
                    - strong [ref=f6e273]: Redis
                    - text: ：用作缓存，加速对高频访问数据（如用户最近24小时健康摘要）的读取。
              - listitem [ref=f6e274]:
                - strong [ref=f6e275]: 数据分析层
                - text: ：部署在独立服务器上，使用TensorFlow和Scikit-learn运行训练好的机器学习模型，并通过REST API对外提供服务。
            - paragraph [ref=f6e276]:
              - text: 该架构遵循高内聚、低耦合的设计原则，每一层职责清晰，便于团队基于
              - strong [ref=f6e277]: 教学实践Ⅱ
              - text: 课程的经验进行分工协作。
            - heading "3.2 主要功能模块" [level=3] [ref=f6e278]
            - heading "3.2.1 健康数据采集模块" [level=4] [ref=f6e279]
            - paragraph [ref=f6e280]: 该模块负责用户健康数据的接入与标准化。具体功能包括：
            - list [ref=f6e281]:
              - listitem [ref=f6e282]:
                - strong [ref=f6e283]: 设备数据接入
                - text: ：支持通过BLE蓝牙、Wi-Fi或API接口从主流设备（如小米手环、华为手表）获取数据。采用适配器模式，为每种设备类型实现独立的数据解析器，以降低耦合度。
              - listitem [ref=f6e284]:
                - strong [ref=f6e285]: 数据标准化
                - text: ：将不同设备的数据格式统一转换为内部标准格式。例如，心率字段统一为
                - code [ref=f6e286]: heart_rate
                - text: ，单位为
                - code [ref=f6e287]: bpm
                - text: ，并保留两位小数。
              - listitem [ref=f6e288]:
                - strong [ref=f6e289]: 数据清洗与融合
                - text: ：在采集端执行初步清洗，包括去除重复数据、过滤异常值（如心率超过220bpm视为异常）及填补缺失值（采用线性插值法）。数据融合算法采用时间戳对齐策略，将同一时间段内的多种数据合并为一条完整的记录。
            - heading "3.2.2 智能分析引擎" [level=4] [ref=f6e290]
            - paragraph [ref=f6e291]: 智能分析引擎是平台的核心，其工作流程分为四个步骤：
            - list [ref=f6e292]:
              - listitem [ref=f6e293]:
                - strong [ref=f6e294]: 特征工程
                - text: ：从原始数据中提取统计特征，如24小时平均心率、心率变异性（HRV）、步数标准差及睡眠周期数等。采用滑动窗口方法，窗口大小设为120分钟，步长为30分钟，生成时序特征矩阵。
              - listitem [ref=f6e295]:
                - strong [ref=f6e296]: 模型训练
                - text: ：使用监督学习方法构建健康状态评估模型。选择XGBoost作为分类器，输入特征为30维，输出标签为“健康”、“亚健康”及“高风险”三类。训练数据来自公开数据集（如PhysioNet上的心率数据）及模拟生成的标注数据。模型采用交叉验证进行调参，最优参数为：学习率0.1，树深度6，样本占比0.8。
              - listitem [ref=f6e297]:
                - strong [ref=f6e298]: 健康风险预警
                - text: ：当模型预测结果为“高风险”时，触发实时预警机制。预警阈值可根据用户历史数据动态调整，例如，当心率连续10分钟超过（用户平均心率+20%）且未恢复时，则发送推送通知。
              - listitem [ref=f6e299]:
                - strong [ref=f6e300]: 趋势预测
                - text: ：采用LSTM模型对用户未来7天的健康指标进行预测，帮助用户提前了解潜在变化。LSTM结构包含两层隐藏层，每层64个神经元，并使用Adam优化器。
            - heading "3.2.3 个性化推荐系统" [level=4] [ref=f6e301]
            - paragraph [ref=f6e302]: 基于协同过滤与内容推荐的混合算法，为用户提供个性化建议：
            - list [ref=f6e303]:
              - listitem [ref=f6e304]:
                - strong [ref=f6e305]: 饮食建议
                - text: ：根据用户BMI、运动消耗及饮食习惯（用户手动输入），推荐低糖、高蛋白等类型的食谱。
              - listitem [ref=f6e306]:
                - strong [ref=f6e307]: 运动建议
                - text: ：依据用户心肺功能评分（由心率变异性评估），推荐跑步、游泳或瑜伽等运动方式，并给出强度建议（例如，中等强度有氧运动30分钟/天）。
              - listitem [ref=f6e308]:
                - strong [ref=f6e309]: 作息建议
                - text: ：根据睡眠分析结果，建议就寝时间与午休时长，并在用户实际睡眠质量低于阈值时推送改善策略。
            - paragraph [ref=f6e310]: 推荐系统采用基于用户的协同过滤算法，相似度计算采用皮尔逊相关系数，候选推荐池包含5000条预标注的健康建议条目。
            - heading "3.3 关键技术的实现细节" [level=3] [ref=f6e311]
            - heading "3.3.1 数据清洗与融合算法" [level=4] [ref=f6e312]
            - paragraph [ref=f6e313]: 数据清洗采用两步策略：
            - list [ref=f6e314]:
              - listitem [ref=f6e315]:
                - strong [ref=f6e316]: 基于规则的清洗
                - text: ：定义物理限值规则，例如，步数应位于0-100000步/天范围内，心率应在30-220bpm范围内。超出范围的数据被标记为可疑，并执行平滑处理。
              - listitem [ref=f6e317]:
                - strong [ref=f6e318]: 基于统计的清洗
                - text: ：计算每个用户数据的时间序列滑动均值与标准差，若某点偏差超过3倍标准差，则视为异常值，并使用前后20帧的中位数进行替代。
            - paragraph [ref=f6e319]: 数据融合算法采用时间戳加权平均法，公式为：
            - code [ref=f6e321]: 融合值 = Σ(w_i * data_i) / Σ(w_i)
            - paragraph [ref=f6e322]: 其中权重 w_i = 1/(1+|t - t_ref|)，t_ref为参考时间点，确保离参考时间越近的数据贡献越大。
            - heading "3.3.2 用户画像构建方法" [level=4] [ref=f6e323]
            - paragraph [ref=f6e324]: 用户画像是一个动态更新的结构化文档，包含以下维度：
            - list [ref=f6e325]:
              - listitem [ref=f6e326]: 基础属性：年龄、性别、BMI、慢性病史。
              - listitem [ref=f6e327]: 行为特征：平均每日步数、运动频率、睡眠时长中位数。
              - listitem [ref=f6e328]: 健康状态历史：过去30天中“高风险”天数占比、心率变异性趋势。
            - paragraph [ref=f6e329]: 画像采用在线向量更新机制，每次新数据到达后，使用指数移动平均法更新画像特征。例如，平均心率的更新公式为：
            - code [ref=f6e331]: new_avg = α * current_value + (1-α) * old_avg
            - paragraph [ref=f6e332]: 其中α=0.2，以对近期数据赋予更高权重。
            - heading "3.3.3 健康风险预警模型" [level=4] [ref=f6e333]
            - paragraph [ref=f6e334]: 预警模型采用基于XGBoost的风险分类器，输出概率值P(高风险)。当P > 0.7时，触发三级预警（红色通知短信）；当0.5 ≤ P ≤ 0.7时，触发二级预警（应用内推送）。为减少误报，还引入了滞后验证机制：若连续两次检测结果均为高风险，才触发一级预警（电话通知紧急联系人）。
            - heading "3.4 开发环境与工具" [level=3] [ref=f6e335]
            - paragraph [ref=f6e336]:
              - text: 平台开发基于以下技术栈，借鉴了
              - strong [ref=f6e337]: 教学实践Ⅱ
              - text: 课程的推荐配置[1]：
            - list [ref=f6e338]:
              - listitem [ref=f6e339]:
                - strong [ref=f6e340]: 后端
                - text: ：Spring Boot 2.6.3，JDK 11，Maven 3.8.1，MyBatis-Plus 3.5.1（ORM框架）。
              - listitem [ref=f6e341]:
                - strong [ref=f6e342]: 前端
                - text: ：Vue.js 3.0，Element Plus UI组件库，ECharts数据可视化。
              - listitem [ref=f6e343]:
                - strong [ref=f6e344]: 数据库
                - text: ：MySQL 8.0（结构化）、MongoDB 5.0（非结构化）、Redis 6.2（缓存）。
              - listitem [ref=f6e345]:
                - strong [ref=f6e346]: 机器学习
                - text: ：Python 3.8，Scikit-learn 1.0.2，TensorFlow 2.9.0。
              - listitem [ref=f6e347]:
                - strong [ref=f6e348]: 部署
                - text: ：使用Docker进行容器化部署，通过docker-compose编排微服务。
            - paragraph [ref=f6e349]: 开发过程中采用Git进行版本控制，代码评审流程确保了设计质量。
            - heading "3.5 系统安全与隐私保护策略" [level=3] [ref=f6e350]
            - paragraph [ref=f6e351]: 为保障用户健康数据的安全，平台实施了多层防护：
            - list [ref=f6e352]:
              - listitem [ref=f6e353]:
                - strong [ref=f6e354]: 传输加密
                - text: ：所有API通信均采用HTTPS协议，证书由Let’s Encrypt签发，并强制使用TLS 1.2及以上版本。
              - listitem [ref=f6e355]:
                - strong [ref=f6e356]: 存储加密
                - text: ：数据库中用户姓名、身份证号等敏感字段使用AES-256加密存储，密钥由哈希加密的密码派生。
              - listitem [ref=f6e357]:
                - strong [ref=f6e358]: 认证与授权
                - text: ：采用JWT（JSON Web Token）进行无状态认证，token有效期设为24小时。实施基于角色的访问控制：普通用户只能访问自身数据，管理员可审计系统日志，但不能查看具体健康记录。
              - listitem [ref=f6e359]:
                - strong [ref=f6e360]: 隐私保护
                - text: ：在数据分析侧引入差分隐私机制，在模型输出中加入拉普拉斯噪声，确保单个用户数据无法被逆向推断。
            - heading "4 实验" [level=2] [ref=f6e361]
            - heading "4.1 实验环境与数据集" [level=3] [ref=f6e362]
            - paragraph [ref=f6e363]: 实验环境配置如下：
            - list [ref=f6e364]:
              - listitem [ref=f6e365]: 服务器：Ubuntu 20.04，Intel Xeon E5-2680 v4 CPU，32GB RAM，NVIDIA V100 GPU。
              - listitem [ref=f6e366]: 客户端：使用JMeter 5.5模拟测试工具进行性能测试。
            - paragraph [ref=f6e367]: 数据集来源包含两部分：
            - list [ref=f6e368]:
              - listitem [ref=f6e369]:
                - strong [ref=f6e370]: 模拟生成数据
                - text: ：编写Python脚本生成100名用户的30天健康数据，每10秒一条记录，包括心率、步数、血氧饱和度及睡眠阶段（浅睡、深睡、REM）。模拟过程中引入了随机噪声和10%的缺失率。
              - listitem [ref=f6e371]:
                - strong [ref=f6e372]: 真实公开数据
                - text: ：使用PhysioNet上的心率数据集，包含20名健康受试者的10小时ECG数据，采样频率为250Hz。
            - paragraph [ref=f6e373]: 数据预处理包括：降采样至1分钟频率、进行Z-score标准化及异常值剔除。最终得到的训练集大小约为50万条记录，测试集为10万条记录。
            - heading "4.2 系统性能评估" [level=3] [ref=f6e374]
            - heading "4.2.1 响应时间" [level=4] [ref=f6e375]
            - paragraph [ref=f6e376]: 使用JMeter模拟100个并发用户，持续运行5分钟，测试核心API的响应时间。结果如下表所示：
            - table [ref=f6e377]:
              - rowgroup [ref=f6e378]:
                - row "API接口名称 平均响应时间 (ms) 95%分位响应 (ms) 错误率" [ref=f6e379]:
                  - columnheader "API接口名称" [ref=f6e380]
                  - columnheader "平均响应时间 (ms)" [ref=f6e381]
                  - columnheader "95%分位响应 (ms)" [ref=f6e382]
                  - columnheader "错误率" [ref=f6e383]
              - rowgroup [ref=f6e384]:
                - row "数据上传 125.3 210.4 0.02%" [ref=f6e385]:
